name: CI

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

jobs:
  erlang:
    name: Erlang Tests + Dialyzer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: rebar3-otp28-${{ runner.os }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            rebar3-otp28-${{ runner.os }}-

      - name: Compile
        run: rebar3 compile

      - name: Check formatting
        run: rebar3 fmt --check

      - name: Cross-reference analysis
        run: rebar3 xref

      - name: EUnit
        run: rebar3 eunit

      - name: Dialyzer
        run: rebar3 dialyzer

  syscall-matrix:
    name: Syscall Matrix Tests
    runs-on: ubuntu-22.04
    needs: [erlang]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Install test prerequisites
        run: sudo apt-get update && sudo apt-get install -y binutils strace

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: rebar3-otp28-${{ runner.os }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            rebar3-otp28-${{ runner.os }}-

      - name: Cache matrix binaries
        uses: actions/cache@v4
        with:
          path: test/syscall_matrix/bin/asm
          key: matrix-asm-${{ hashFiles('test/syscall_matrix/asm/*.S') }}

      - name: Build matrix binaries
        run: make test-matrix-build

      - name: Run strace
        run: make test-matrix-strace

      - name: Run matrix tests
        run: make test-matrix

  release:
    name: Release ${{ matrix.target.name }}
    runs-on: ubuntu-22.04
    needs: [erlang]
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-linux
            image: hexpm/elixir:1.18.4-erlang-28.4.1-debian-bookworm-20260316-slim
            deps: apt-get update && apt-get install -y git make curl
          - name: x86_64-musl
            image: hexpm/elixir:1.18.4-erlang-28.4.1-alpine-3.21.6
            deps: apk add --no-cache git make curl

    container:
      image: ${{ matrix.target.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: ${{ matrix.target.deps }}

      - name: Install rebar3
        run: |
          curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Build release
        run: rebar3 as prod tar

      - name: Collect artifact
        run: |
          mkdir -p out
          find _build/prod/rel -name '*.tar.gz' \
            -exec cp {} out/erlkoenig_elf-${{ matrix.target.name }}.tar.gz \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: out/*.tar.gz
